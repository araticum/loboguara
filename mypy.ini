[mypy]
python_version = 3.12
ignore_missing_imports = True
no_strict_optional = True

# SQLAlchemy 1.x Column() descriptors produce Column[Any] which mypy cannot
# narrow without sqlalchemy-stubs or the newer mapped_column() API.
# We suppress assignment noise in the ORM layer and the large application files
# that interact with it heavily.
# This keeps the type-checking useful for logic errors without drowning in
# SQLAlchemy descriptor boilerplate.

[mypy-Seriema.main]
disable_error_code = assignment, arg-type, var-annotated, return-value, union-attr, call-overload, call-arg

[mypy-Seriema.worker]
disable_error_code = assignment, arg-type, operator, union-attr, attr-defined, has-type, dict-item, return-value

[mypy-Seriema.models]
disable_error_code = assignment

[mypy-tests.test_worker]
disable_error_code = var-annotated

[mypy-test_worker]
disable_error_code = var-annotated
